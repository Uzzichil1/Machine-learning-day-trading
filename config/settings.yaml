# FTMO ML Trading System Configuration

# ── Account Settings ──
account:
  initial_balance: 100000
  challenge_type: "2-step-normal"  # 2-step-normal | 2-step-aggressive | 1-step
  phase1_target_pct: 10.0
  phase2_target_pct: 5.0

# ── FTMO Risk Limits ──
ftmo_limits:
  max_daily_loss_pct: 5.0
  max_total_loss_pct: 10.0
  best_day_max_pct: 50.0  # Best day cannot exceed 50% of total positive days' profit

# ── Internal Risk Controls (with safety buffer) ──
risk:
  risk_per_trade_pct: 0.40        # Optimized: grid search winner (was 0.25)
  max_risk_per_trade_pct: 0.50    # Hard cap per trade
  max_open_risk_pct: 1.2          # Total risk across all open positions
  daily_loss_halt_pct: 3.0        # Halt trading for day (buffer before FTMO 5%)
  total_drawdown_halt_pct: 8.0    # Halt all trading (buffer before FTMO 10%)
  max_concurrent_trades: 3
  max_trades_per_day: 8
  stop_loss_atr_multiple: 1.5     # SL distance = 1.5 * ATR(14)
  take_profit_atr_multiple: 2.50  # Optimized: 1.67R (was 2.25/1.5R)
  signal_offset: 0.02             # Median +/- offset for signal thresholds

# ── Instruments ──
instruments:
  - symbol: "EURUSD"
    enabled: false  # Disabled — model shows negative edge on EURUSD
    session_utc: [8, 21]   # Trade during London+NY
    pip_value: 10.0         # Per standard lot
    min_volume: 0.01
  - symbol: "XAUUSD"
    enabled: true
    session_utc: [8, 21]
    pip_value: 1.0
    min_volume: 0.01
  - symbol: "USTEC"
    enabled: true
    session_utc: [13, 21]  # US session only
    pip_value: 1.0
    min_volume: 0.01

# ── Timeframes ──
timeframes:
  signal: "H1"        # Primary signal generation
  entry: "M15"        # Entry refinement
  regime: "H4"        # Regime detection context

# ── Model Settings ──
model:
  ensemble_method: "stacking"    # stacking | voting
  base_learners:
    - "lightgbm"
    - "xgboost"
    - "catboost"
  meta_learner: "logistic_regression"
  gru_sequence_length: 30        # Bars of OHLCV fed to GRU
  gru_hidden_size: 64
  gru_num_layers: 2
  retrain_interval_days: 30      # Monthly retraining

# ── Feature Engineering ──
features:
  lookback_periods: [1, 3, 5, 10, 20]
  rsi_periods: [7, 14, 21]
  ma_periods: [20, 50, 200]
  atr_period: 14
  bb_period: 20
  bb_std: 2.0
  max_features: 40               # Feature selection target

# ── Labeling ──
labeling:
  method: "triple_barrier"
  upper_barrier_atr: 1.5         # TP in ATR multiples
  lower_barrier_atr: 1.5         # SL in ATR multiples
  max_holding_bars: 8            # Time barrier in H1 bars

# ── Validation ──
validation:
  method: "cpcv"                 # cpcv | walk_forward
  n_splits: 6
  embargo_pct: 0.01              # 1% embargo between train/test
  max_pbo: 0.25                  # Max acceptable Probability of Backtest Overfitting
  monte_carlo_runs: 1000
  confidence_threshold: 0.95     # Strategy must beat 95% of shuffled results

# ── Data ──
data:
  history_years: 4               # Years of historical data to download
  train_pct: 0.60
  validation_pct: 0.20
  test_pct: 0.20                 # Deep OOS, touched once

# ── Execution ──
execution:
  magic_number: 234000
  deviation_points: 20
  filling_mode: "ioc"            # ioc | fok
  poll_interval_seconds: 5       # Live data polling frequency
  comment_prefix: "ftmo_ml"

# ── Logging ──
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_bytes: 10485760            # 10MB
  backup_count: 5
